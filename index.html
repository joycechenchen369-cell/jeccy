<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>JECCY 管理后台</title>
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    :root {
      --jeccy-blue: #36497d;
      --jeccy-blue-light: #4f68b3;
      --jeccy-blue-soft: #6f8ad6;
      --bg-deep: #050712;
      --text-main: #f5f7ff;
      --text-sub: #a2aacb;
      --border-soft: rgba(255, 255, 255, 0.06);
      --glass: rgba(10, 13, 32, 0.92);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      background: var(--bg-deep);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text-main);
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0, rgba(102, 165, 255, 0.16), transparent 45%),
        radial-gradient(circle at 100% 100%, rgba(63, 117, 255, 0.22), transparent 55%),
        #050712;
    }

    .topbar {
      flex-shrink: 0;
      padding: 10px 16px;
      padding-top: calc(10px + env(safe-area-inset-top, 0px));
      background:
        radial-gradient(circle at 0 0, rgba(111, 170, 255, 0.46), transparent 55%),
        linear-gradient(120deg, #020518, #06081e 55%, #020310);
      border-bottom: 1px solid var(--border-soft);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
    }

    .brand-logo {
      height: 28px;
      margin-right: 10px;
      display: flex;
      align-items: center;
    }

    .brand-logo img {
      height: 28px;
      display: block;
    }

    .brand-text-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand-text-main {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .brand-text-sub {
      margin-top: 1px;
      font-size: 11px;
      color: var(--text-sub);
    }

    .topbar-spacer {
      flex: 1;
    }

    .topbar-tag {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(152, 177, 255, 0.65);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #d9e3ff;
      background: linear-gradient(
        120deg,
        rgba(89, 132, 255, 0.9),
        rgba(149, 196, 255, 0.7)
      );
      box-shadow: 0 4px 18px rgba(3, 10, 53, 0.7);
    }

    .layout {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
      gap: 10px;
    }

    .mobile-nav {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }

    .nav-list {
      display: flex;
      list-style: none;
      gap: 10px;
    }

    .nav-button {
      border: none;
      background: var(--glass);
      color: #dde1ff;
      padding: 10px 14px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.7);
      transition: all 0.18s ease-out;
    }

    .nav-button span.icon-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--jeccy-blue-soft), #cce4ff);
      box-shadow: 0 0 0 2px rgba(120, 163, 255, 0.5);
      flex-shrink: 0;
    }

    .nav-button span.badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(148, 184, 255, 0.6);
      color: #dce7ff;
      background: linear-gradient(
        120deg,
        rgba(76, 120, 255, 0.9),
        rgba(150, 199, 255, 0.9)
      );
      flex-shrink: 0;
    }

    .nav-button:hover {
      background: rgba(19, 31, 76, 0.96);
      transform: translateY(-1px);
    }

    .nav-button.active {
      background: linear-gradient(135deg, var(--jeccy-blue), var(--jeccy-blue-light));
      color: #ffffff;
      box-shadow:
        0 14px 32px rgba(6, 15, 59, 0.95),
        0 0 0 1px rgba(189, 212, 255, 0.8);
    }

    .nav-button.active span.badge {
      color: var(--jeccy-blue);
      background: #f5f8ff;
      border-color: transparent;
    }

    .content-header {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px 2px;
    }

    .content-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #e6ebff;
    }

    .content-subtitle {
      font-size: 12px;
      color: var(--text-sub);
    }

    .content-shell {
      flex: 1;
      min-height: 0;
      border-radius: 18px;
      border: 1px solid var(--border-soft);
      background:
        radial-gradient(circle at 0 0, rgba(115, 183, 255, 0.22), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(80, 131, 255, 0.28), transparent 55%),
        linear-gradient(150deg, #05091c, #050615);
      box-shadow:
        0 18px 50px rgba(0, 0, 0, 0.9),
        0 0 0 1px rgba(255, 255, 255, 0.02);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .content-shell-header {
      height: 32px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      background: linear-gradient(
        120deg,
        rgba(85, 141, 255, 0.42),
        rgba(37, 63, 153, 0.9)
      );
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .window-dots {
      display: flex;
      gap: 5px;
      margin-right: 8px;
    }

    .window-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #ff5f57;
    }

    .window-dot:nth-child(2) { background: #febc2e; }
    .window-dot:nth-child(3) { background: #28c840; }

    .shell-title {
      font-size: 11px;
      color: #e1e8ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .shell-title span {
      opacity: 0.8;
    }

    .shell-title strong {
      font-weight: 600;
    }

    .content-shell-body {
      flex: 1;
      min-height: 0;
    }

    .content-iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #020311;
    }

    @media (min-width: 900px) {
      body {
        justify-content: flex-start;
      }

      .layout {
        flex-direction: row;
        padding: 16px 24px 20px;
        gap: 18px;
      }

      .mobile-nav {
        display: none;
      }

      .sidebar-pc {
        width: 240px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        padding: 16px 14px;
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(6, 10, 31, 0.98), rgba(4, 7, 22, 0.98));
        border: 1px solid var(--border-soft);
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.85);
      }

      .sidebar-title {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: #6e769a;
        margin-bottom: 8px;
      }

      .nav-list-pc {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .pc-only-footer {
        margin-top: auto;
        font-size: 11px;
        color: #5f6686;
        border-top: 1px solid var(--border-soft);
        padding-top: 12px;
      }

      .pc-only-footer span {
        color: var(--jeccy-blue-soft);
      }

      .content-area {
        flex: 1;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .content-header {
        padding: 0 2px 10px;
      }
    }

    @media (max-width: 899.98px) {
      .sidebar-pc {
        display: none;
      }

      .pc-only-footer {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand-logo">
      <img
        src="./assets/LOGO-46990a3f-69a9-4b65-b15d-ed5838e43552.png"
        alt="JECCY Logo"
      />
    </div>
    <div class="brand-text-block">
      <div class="brand-text-main">JECCY</div>
      <div class="brand-text-sub">Enterprise Knowledge & Training Console</div>
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-tag">JECCY · Admin</div>
  </div>

  <div class="layout">
    <aside class="sidebar-pc">
      <div class="sidebar-title">知识与成长中心</div>
      <ul class="nav-list-pc">
        <li>
          <button
            class="nav-button active"
            data-target="JECCY_培训学院.html"
          >
            <span class="icon-dot"></span>
            <span class="label">培训学院</span>
            <span class="badge">Academy</span>
          </button>
        </li>
        <li>
          <button
            class="nav-button"
            data-target="JECCY_企业知识库.html"
          >
            <span class="icon-dot"></span>
            <span class="label">企业知识库</span>
            <span class="badge">Knowledge</span>
          </button>
        </li>
      </ul>
      <div class="pc-only-footer">
        JECCY © <span>Enterprise Intelligence Suite</span>
      </div>
    </aside>

    <div class="content-area">
      <nav class="mobile-nav">
        <ul class="nav-list">
          <li>
            <button
              class="nav-button active"
              data-target="JECCY_培训学院.html"
            >
              <span class="icon-dot"></span>
              <span class="label">培训学院</span>
              <span class="badge">Academy</span>
            </button>
          </li>
          <li>
            <button
              class="nav-button"
              data-target="JECCY_企业知识库.html"
            >
              <span class="icon-dot"></span>
              <span class="label">企业知识库</span>
              <span class="badge">Knowledge</span>
            </button>
          </li>
        </ul>
      </nav>

      <header class="content-header">
        <div class="content-title">JECCY 内容控制台</div>
        <div class="content-subtitle">
          通过一个入口，在手机微信和网页中统一访问培训学院与企业知识库。
        </div>
      </header>

      <section class="content-shell">
        <div class="content-shell-header">
          <div class="window-dots">
            <span class="window-dot"></span>
            <span class="window-dot"></span>
            <span class="window-dot"></span>
          </div>
          <div class="shell-title">
            <span>JECCY /</span>
            <strong id="shell-title-text"> 培训学院</strong>
          </div>
        </div>

        <div class="content-shell-body">
          <iframe
            id="content-frame"
            class="content-iframe"
            src="./JECCY_培训学院.html"
          ></iframe>
        </div>
      </section>
    </div>
  </div>

  <script>
    (function () {
      var buttons = document.querySelectorAll(".nav-button");
      var frame = document.getElementById("content-frame");
      var shellTitleText = document.getElementById("shell-title-text");

      var mapLabel = {
        "JECCY_培训学院.html": "培训学院",
        "JECCY_企业知识库.html": "企业知识库"
      };

      buttons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          var target = btn.getAttribute("data-target");
          if (!target || !frame) return;

          // 用 URL 解析器基于当前部署路径生成绝对地址，避免相对路径在不同托管路径下失效
          frame.setAttribute("src", new URL(target, window.location.href).toString());

          buttons.forEach(function (b) {
            b.classList.remove("active");
          });
          btn.classList.add("active");

          shellTitleText.textContent = mapLabel[target] || " 内容预览";
        });
      });
    })();
  </script>
</body>
</html>
